<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 500px;
            background: linear-gradient(to bottom,#434343,#632);
            margin: 0;

        }

        .ball{
            width:100px;
            height:100px;
            background-color: chartreuse;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 10px 20px rgba(0 0 0 0.3);
            animation: bounce 3s, infinite ease-in-out;
        }

        @keyframes bounce{
            0%,100%{
                    transform: translateY(0);
            }

            50%{
                transform: translateY(200px);
            }
        }
    </style>
</head>

<body>
    <div class="ball"></div>
</body>
</html>
