<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        .container{
            display: flex;
            gap: 10px;
        }

        .box{
            background: rgb(202, 25, 108);
            padding: 10px;
            border: 10px;
        }

        @media screen and (max-width:768px) {
            .container {
                flex-direction:column;
            }
        }

       
    </style>
</head>
<body>
    <div class="container">
        <div class="box">person 1</div>
        <div  class="box">person 2</div>
</body>
</html>
