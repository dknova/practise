<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        section{
            position: absolute;
            z-index: 2;
        }

        div{
            height: 100px;
            width: 100px;
            outline: dotted;
            line-height: 100px;
            text-align: center;
            font-size: 40px;
            position: absolute;
        }

        #div1{
            background-color: brown;
            top:0;
            left: 0;
            z-index: 5;
        }

        #div2{
            background-color: cadetblue;
            top: 10px;
            left: 10px;
            z-index: -9;
        }

        #div3{
            background-color: chartreuse;
            top:30px;
            left:30px;
            z-index: 0;

        }
    </style>
</head>
<body>
    <section>
        <div id="div1">#1</div>
        <div id="div2">#2</div>
   </section>
    <div id="div3">#3</div>
    
</body>
</html>
