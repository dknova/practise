<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRATION</title>
</head>
<body>
    <form>
        <fieldset>
            <center>
            <legend><b><u>STUDENT REGISTRATION FORM</u></b></legend><br><br>

            <label>Full Name:</label>
            <input type="text" name="ful name"><br><br>

            <label>Email:</label>
            <input type="email" name="email"><br><br>

            <label>Password:</label>
            <input type="password" name="password"><br><br>

            <label>Phoneno:</label>
            <input type="text" name="phoneno"><br><br>

            <label>Gender:</label>
            <input type="radio" name="gender">Male
            <input type="radio" name="gender">Female<br><br>

            <label>Hobbies:</label>
            <input type="checkbox" name="hobbies">Reading
            <input type="checkbox" name="hobbies">Playing games
            <input type="checkbox" name="hobbies">Listening music<br><br>

            <label>Course:</label>
            <select>
                <option> </option>
                <option>BE/Btech</option>
                <option>BCA</option>
                <option>Bsc</option>
                <option>MCA</option>
                <option>B.Com</option>
            </select><br><br>

            <label>Address:</label>
            <textarea name="" id="" cols="20" rows="3"></textarea>><br><br>

            <label>Date of Birth:</label>
            <input type="date" name="date of birth"><br><br>

            <label>Upload file:</label>
            <input type="file" name="upload file"><br><br>

            <input type="submit" value="Register"><br><br>
            <input type="reset" value="Clear">

            </center>
        </fieldset>
    </form>
</body>
</html>
